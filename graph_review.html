<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw Log Analyzer - Graph Architecture Review</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --surface2: #21262d;
    --border: #30363d; --text: #e6edf3; --text2: #8b949e;
    --blue: #58a6ff; --green: #3fb950; --purple: #bc8cff;
    --orange: #d29922; --red: #f85149; --cyan: #39d2c0;
    --pink: #f778ba; --yellow: #e3b341;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

  /* Header */
  .header { padding: 24px 40px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; }
  .header h1 { font-size: 22px; font-weight: 600; }
  .header .subtitle { color: var(--text2); font-size: 14px; }

  /* Tab navigation */
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); padding: 0 40px; background: var(--surface); }
  .tab { padding: 12px 24px; cursor: pointer; color: var(--text2); border-bottom: 2px solid transparent; font-size: 14px; font-weight: 500; transition: all 0.2s; }
  .tab:hover { color: var(--text); background: var(--surface2); }
  .tab.active { color: var(--blue); border-bottom-color: var(--blue); }

  /* Canvas container */
  .canvas-container { display: flex; justify-content: center; padding: 40px; min-height: calc(100vh - 120px); }
  .canvas-container.hidden { display: none; }

  /* SVG styles */
  svg { font-family: 'Segoe UI', system-ui, sans-serif; }
  .node-rect { rx: 8; ry: 8; stroke-width: 2; cursor: pointer; transition: filter 0.2s; }
  .node-rect:hover { filter: brightness(1.2); }
  .node-label { font-size: 13px; font-weight: 600; fill: var(--text); pointer-events: none; }
  .node-sublabel { font-size: 10.5px; fill: var(--text2); pointer-events: none; }
  .node-detail { font-size: 9.5px; fill: #6e7681; pointer-events: none; }
  .edge-line { stroke-width: 2; fill: none; }
  .edge-label { font-size: 10px; fill: var(--text2); }
  .arrow { fill: var(--text2); }
  .group-rect { rx: 12; ry: 12; stroke-width: 1.5; stroke-dasharray: 6 3; fill-opacity: 0.04; }
  .group-label { font-size: 12px; font-weight: 600; fill-opacity: 0.7; }
  .legend-box { rx: 4; ry: 4; }
  .legend-text { font-size: 11px; fill: var(--text2); }
  .annotation { font-size: 10px; fill: var(--orange); font-style: italic; }
  .section-title { font-size: 16px; font-weight: 700; fill: var(--text); }
  .section-subtitle { font-size: 11px; fill: var(--text2); }
  .connector-label { font-size: 9px; fill: var(--cyan); font-weight: 500; }
  .data-flow { font-size: 9px; fill: var(--green); }
  .state-field { font-size: 9.5px; fill: #7ee787; font-family: 'SF Mono', 'Fira Code', monospace; }
  .warn-text { font-size: 9.5px; fill: var(--orange); }
  .issue-marker { font-size: 10px; fill: var(--red); font-weight: 700; }

  /* Tooltip */
  .tooltip { position: fixed; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; max-width: 380px; font-size: 13px; line-height: 1.5; z-index: 100; pointer-events: none; opacity: 0; transition: opacity 0.15s; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
  .tooltip.visible { opacity: 1; }
  .tooltip h4 { color: var(--blue); margin-bottom: 6px; font-size: 13px; }
  .tooltip .field { color: var(--text2); }
  .tooltip .field b { color: var(--text); }
  .tooltip code { background: var(--surface2); padding: 1px 5px; border-radius: 3px; font-size: 12px; color: var(--green); }

  /* Side panel */
  .side-panel { position: fixed; right: 0; top: 0; width: 420px; height: 100vh; background: var(--surface); border-left: 1px solid var(--border); padding: 24px; overflow-y: auto; transform: translateX(100%); transition: transform 0.3s; z-index: 50; }
  .side-panel.open { transform: translateX(0); }
  .side-panel h3 { font-size: 16px; margin-bottom: 12px; color: var(--blue); }
  .side-panel .close-btn { position: absolute; top: 16px; right: 16px; background: none; border: none; color: var(--text2); cursor: pointer; font-size: 20px; }
  .side-panel .section { margin-bottom: 20px; }
  .side-panel .section h4 { font-size: 13px; color: var(--purple); margin-bottom: 8px; }
  .side-panel pre { background: var(--surface2); padding: 12px; border-radius: 6px; font-size: 12px; overflow-x: auto; line-height: 1.5; color: var(--green); }
  .side-panel .field-row { display: flex; gap: 8px; margin-bottom: 4px; font-size: 12px; }
  .side-panel .field-row .key { color: var(--text2); min-width: 100px; }
  .side-panel .field-row .val { color: var(--text); }
  .side-panel .issue-box { background: rgba(248,81,73,0.1); border: 1px solid rgba(248,81,73,0.3); border-radius: 6px; padding: 10px 12px; margin-top: 8px; font-size: 12px; color: var(--red); }
</style>
</head>
<body>

<div class="header">
  <h1>OpenClaw Log Analyzer</h1>
  <span class="subtitle">Graph Architecture Review &mdash; click any node for details</span>

  <div class="tab" onclick="showTab('trace')">Agent Trace Layer</div>
  <div class="tab" onclick="showTab('data')">Data Flow &amp; State</div>
</div>

<div class="tooltip" id="tooltip"></div>

  <text x="635" y="352" text-anchor="middle" class="node-label">classify</text>
  <text x="635" y="370" text-anchor="middle" class="node-sublabel">LLM call + JSON parse</text>
  <text x="635" y="384" text-anchor="middle" class="node-detail">RetryPolicy(3) for API failures</text>

  <!-- Arrow -->

  <!-- user_message -->

<script>
// Tab switching
function showTab(name) {
  document.querySelectorAll('.canvas-container').forEach(el => el.classList.add('hidden'));
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.remove('hidden');
  event.target.classList.add('active');
}

// Tooltip
const tooltip = document.getElementById('tooltip');
document.querySelectorAll('[data-tip]').forEach(el => {
  el.addEventListener('mouseenter', e => {
    tooltip.innerHTML = el.getAttribute('data-tip');
    tooltip.classList.add('visible');
  });
  el.addEventListener('mousemove', e => {
    const x = e.clientX + 15;
    const y = e.clientY + 10;
    const maxX = window.innerWidth - 400;
    const maxY = window.innerHeight - 200;
    tooltip.style.left = Math.min(x, maxX) + 'px';
    tooltip.style.top = Math.min(y, maxY) + 'px';
  });
  el.addEventListener('mouseleave', () => {
    tooltip.classList.remove('visible');
  });
});

// Side panel
function closeSidePanel() {
  document.getElementById('sidePanel').classList.remove('open');
}
</script>
